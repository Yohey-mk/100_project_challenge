<!DOCTYPE html>
<html>
<head>
    <title>RealTimeTextEditor</title>
    <style>
        body {background-color: #1e1e1e; color: #ffffff; padding: 20px;}
        textarea {width: 100%; height: 400px; font-size: 18px; padding: 10px; background-color: #2d2d2d; color: white; border: 1px solid #555; }
    </style>
</head>
<body>
    <h1>RealTimeTextEditor</h1>
    <textarea id="editor" oninput="sendText()"></textarea>

    <script>
        const ws = new WebSocket("ws://localhost:8000/ws")
        const editor = document.getElementById("editor")

        ws.onmessage = (event) => {
            editor.value = event.data
        }

        function sendText() {
            ws.send(editor.value)
        }
    </script>
</body>
</html>
